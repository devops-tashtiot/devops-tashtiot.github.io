<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>devops-tashtiot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f6f8fa;
      color: #24292f;
      min-height: 100vh;
      padding: 48px 24px;
    }

    nav {
      position: fixed;
      top: 16px;
      right: 24px;
      z-index: 100;
    }

    nav a {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.85rem;
      font-weight: 600;
      color: #24292f;
      text-decoration: none;
      background: #ffffff;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      padding: 6px 14px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    nav a:hover {
      border-color: #0969da;
      box-shadow: 0 0 0 3px rgba(9, 105, 218, 0.1);
      color: #0969da;
    }

    header {
      text-align: center;
      margin-bottom: 56px;
    }

    header h1 {
      font-size: 2rem;
      color: #24292f;
      letter-spacing: -0.5px;
    }

    header p {
      margin-top: 8px;
      color: #57606a;
      font-size: 1rem;
    }

    #content {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 48px;
    }

    .section-label {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #57606a;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 2px solid #d0d7de;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
    }

    .aws-subsections {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .subsection-label {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #8c959f;
      margin-bottom: 10px;
    }

    .card {
      background: #ffffff;
      border: 1px solid #d0d7de;
      border-radius: 10px;
      padding: 22px;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .card:hover {
      border-color: #0969da;
      box-shadow: 0 0 0 3px rgba(9, 105, 218, 0.1);
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .card-icon { font-size: 1.3rem; }

    .card-name {
      font-size: 0.95rem;
      font-weight: 600;
      color: #0969da;
    }

    .card-desc {
      font-size: 0.85rem;
      color: #57606a;
      line-height: 1.55;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 4px;
    }

    .tag {
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 20px;
      background: #eaeef2;
      border: 1px solid #d0d7de;
      color: #57606a;
    }

    footer {
      text-align: center;
      margin-top: 64px;
      color: #8c959f;
      font-size: 0.8rem;
    }

    footer a { color: #8c959f; text-decoration: none; }
    footer a:hover { color: #0969da; }
  </style>
</head>
<body>

<nav>
  <a href="/docs/">📄 Docs</a>
</nav>

<header>
  <h1 id="org-name">devops-tashtiot</h1>
  <p id="org-tagline"></p>
</header>

<div id="content"></div>

<footer>
  <a id="org-link" href="https://github.com/devops-tashtiot" target="_blank" rel="noopener">github.com/devops-tashtiot</a>
</footer>

<script>
  function buildCard(repo) {
    const tags = (repo.tags || []).map(t => `<span class="tag">${t}</span>`).join('');
    return `
      <a class="card" href="${repo.url}" target="_blank" rel="noopener">
        <div class="card-header">
          <span class="card-icon">${repo.icon || '📁'}</span>
          <span class="card-name">${repo.name}</span>
        </div>
        <p class="card-desc">${repo.description}</p>
        <div class="card-tags">${tags}</div>
      </a>`;
  }

  function buildGrid(repos) {
    return `<div class="grid">${repos.map(buildCard).join('')}</div>`;
  }

  function buildSection(section) {
    const label = `<div class="section-label">${section.name}</div>`;

    if (section.subsections) {
      const subs = section.subsections.map(sub => `
        <div>
          <div class="subsection-label">${sub.name}</div>
          ${buildGrid(sub.repos)}
        </div>`).join('');
      return `<div>${label}<div class="aws-subsections">${subs}</div></div>`;
    }

    return `<div>${label}${buildGrid(section.repos)}</div>`;
  }

  fetch('repos.json')
    .then(r => r.json())
    .then(data => {
      document.getElementById('org-name').textContent = data.org || 'devops-tashtiot';
      document.getElementById('org-tagline').textContent = data.tagline || '';
      document.getElementById('org-link').href = `https://github.com/${data.org}`;
      document.getElementById('org-link').textContent = `github.com/${data.org}`;
      document.getElementById('content').innerHTML = data.sections.map(buildSection).join('');
    });
</script>

</body>
</html>
